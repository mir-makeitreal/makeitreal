<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="860" height="520" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>

    <!-- Arrow markers -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>

    <!-- Glow filters -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-rose" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="#020617"/>
  <!-- Grid -->
  <rect width="860" height="520" fill="url(#grid)"/>

  <!-- Title area -->
  <text x="430" y="38" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#f1f5f9" letter-spacing="1">MODULE DEPENDENCY GRAPH</text>
  <text x="430" y="56" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#475569" letter-spacing="2">auth-system · make-it-real</text>
  <line x1="160" y1="66" x2="700" y2="66" stroke="#1e293b" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- MODULE 1: user-store (top-left) -->
  <!-- ============================================================ -->
  <!-- Shadow rect -->
  <rect x="72" y="102" width="200" height="120" rx="6" fill="#0f172a" filter="url(#drop-shadow)"/>
  <!-- Opaque base -->
  <rect x="70" y="100" width="200" height="120" rx="6" fill="#0f172a"/>
  <!-- Colored overlay -->
  <rect x="70" y="100" width="200" height="120" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5" filter="url(#glow-green)"/>
  <!-- Top accent bar -->
  <rect x="70" y="100" width="200" height="4" rx="2" fill="#34d399" opacity="0.7"/>

  <!-- Badge -->
  <rect x="82" y="112" width="54" height="16" rx="3" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="0.8"/>
  <text x="109" y="123.5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#34d399" letter-spacing="0.5">backend</text>

  <!-- Module name -->
  <text x="170" y="148" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#f1f5f9">user-store</text>

  <!-- Surface label -->
  <text x="170" y="166" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#94a3b8">surface: registerUser</text>

  <!-- Divider -->
  <line x1="90" y1="176" x2="250" y2="176" stroke="#1e293b" stroke-width="1"/>

  <!-- Contract ID -->
  <text x="170" y="191" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#475569">contract·usr-store-v1</text>
  <text x="170" y="207" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#334155">hash: a3f9c2d</text>

  <!-- ============================================================ -->
  <!-- MODULE 2: session-service (top-right) -->
  <!-- ============================================================ -->
  <rect x="592" y="102" width="200" height="120" rx="6" fill="#0f172a" filter="url(#drop-shadow)"/>
  <rect x="590" y="100" width="200" height="120" rx="6" fill="#0f172a"/>
  <rect x="590" y="100" width="200" height="120" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5" filter="url(#glow-green)"/>
  <rect x="590" y="100" width="200" height="4" rx="2" fill="#34d399" opacity="0.7"/>

  <rect x="602" y="112" width="54" height="16" rx="3" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="0.8"/>
  <text x="629" y="123.5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#34d399" letter-spacing="0.5">backend</text>

  <text x="690" y="148" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#f1f5f9">session-service</text>
  <text x="690" y="166" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#94a3b8">surface: loginUser</text>

  <line x1="610" y1="176" x2="770" y2="176" stroke="#1e293b" stroke-width="1"/>

  <text x="690" y="191" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#475569">contract·session-svc-v1</text>
  <text x="690" y="207" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#334155">hash: b7e1a4f</text>

  <!-- ============================================================ -->
  <!-- MODULE 3: rbac (bottom-left) -->
  <!-- ============================================================ -->
  <rect x="72" y="322" width="200" height="120" rx="6" fill="#0f172a" filter="url(#drop-shadow)"/>
  <rect x="70" y="320" width="200" height="120" rx="6" fill="#0f172a"/>
  <rect x="70" y="320" width="200" height="120" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5" filter="url(#glow-rose)"/>
  <rect x="70" y="320" width="200" height="4" rx="2" fill="#fb7185" opacity="0.7"/>

  <rect x="82" y="332" width="54" height="16" rx="3" fill="rgba(251,113,133,0.15)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="109" y="343.5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#fb7185" letter-spacing="0.5">security</text>

  <text x="170" y="368" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#f1f5f9">rbac</text>
  <text x="170" y="386" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#94a3b8">surface: authorizeSession</text>

  <line x1="90" y1="396" x2="250" y2="396" stroke="#1e293b" stroke-width="1"/>

  <text x="170" y="411" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#475569">contract·rbac-v2</text>
  <text x="170" y="427" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#334155">hash: c9d5e8b</text>

  <!-- ============================================================ -->
  <!-- MODULE 4: audit-log (bottom-right) -->
  <!-- ============================================================ -->
  <rect x="592" y="322" width="200" height="120" rx="6" fill="#0f172a" filter="url(#drop-shadow)"/>
  <rect x="590" y="320" width="200" height="120" rx="6" fill="#0f172a"/>
  <rect x="590" y="320" width="200" height="120" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5" filter="url(#glow-green)"/>
  <rect x="590" y="320" width="200" height="4" rx="2" fill="#34d399" opacity="0.7"/>

  <rect x="602" y="332" width="54" height="16" rx="3" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="0.8"/>
  <text x="629" y="343.5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#34d399" letter-spacing="0.5">backend</text>

  <text x="690" y="368" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#f1f5f9">audit-log</text>
  <text x="690" y="386" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#94a3b8">surface: recordAuthAudit</text>

  <line x1="610" y1="396" x2="770" y2="396" stroke="#1e293b" stroke-width="1"/>

  <text x="690" y="411" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#475569">contract·audit-log-v1</text>
  <text x="690" y="427" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="7.5" fill="#334155">hash: d2f7a1c</text>

  <!-- ============================================================ -->
  <!-- ARROWS -->
  <!-- ============================================================ -->

  <!-- session-service → depends on → user-store (horizontal, top) -->
  <!-- From left edge of session-service (590,160) to right edge of user-store (270,160) -->
  <line x1="588" y1="155" x2="274" y2="155" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <!-- Label above the arrow -->
  <rect x="360" y="140" width="140" height="14" rx="3" fill="#0f172a" opacity="0.9"/>
  <text x="430" y="150" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#94a3b8">depends on · usr-store-v1</text>

  <!-- rbac → depends on → session-service (vertical-ish, right side) -->
  <!-- From top of rbac... we do a path from rbac right edge to session-service bottom -->
  <!-- rbac right=270, center-y=380; session-service bottom=220, center-x=690 -->
  <path d="M 270 380 Q 430 380 430 300 Q 430 220 588 200" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowhead-rose)" opacity="0.8"/>
  <!-- Label -->
  <rect x="300" y="270" width="130" height="14" rx="3" fill="#0f172a" opacity="0.9"/>
  <text x="365" y="280" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#fb7185">depends on · session-svc-v1</text>

  <!-- audit-log → depends on → rbac (horizontal, bottom) -->
  <!-- From left of audit-log (590,380) to right of rbac (270,380) -->
  <line x1="588" y1="375" x2="274" y2="375" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <!-- Label -->
  <rect x="360" y="356" width="140" height="14" rx="3" fill="#0f172a" opacity="0.9"/>
  <text x="430" y="366" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#94a3b8">depends on · rbac-v2</text>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <rect x="290" y="468" width="280" height="40" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <!-- Backend legend -->
  <rect x="305" y="480" width="12" height="12" rx="2" fill="rgba(6,78,59,0.6)" stroke="#34d399" stroke-width="1"/>
  <text x="323" y="490" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#94a3b8">backend module</text>
  <!-- Security legend -->
  <rect x="430" y="480" width="12" height="12" rx="2" fill="rgba(136,19,55,0.6)" stroke="#fb7185" stroke-width="1"/>
  <text x="448" y="490" font-family="'JetBrains Mono', monospace" font-size="8.5" fill="#94a3b8">security module</text>

  <!-- Subtitle bottom -->
  <text x="430" y="510" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#334155">contracts are frozen at review · parallel builds enforced</text>
</svg>
