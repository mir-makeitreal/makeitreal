<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 340" width="1040" height="340" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>

    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-freeze" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- Glow for freeze marker -->
    <filter id="glow-amber" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle stage glow -->
    <filter id="stage-glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1040" height="340" fill="#020617"/>
  <rect width="1040" height="340" fill="url(#grid)"/>

  <!-- Title -->
  <text x="520" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9" letter-spacing="1">DEVELOPMENT FLOW</text>
  <text x="520" y="54" text-anchor="middle" font-size="10" fill="#475569" letter-spacing="2">make-it-real · claude code plugin</text>
  <line x1="100" y1="64" x2="940" y2="64" stroke="#1e293b" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- STAGE DEFINITIONS: x positions for 6 stages               -->
  <!-- Stage width=130, gap=22, start=30                          -->
  <!-- Stages at x: 30, 182, 334, 486, 638, 790                  -->
  <!-- ============================================================ -->

  <!-- ── STAGE 1: Describe ── -->
  <rect x="32" y="92" width="130" height="160" rx="6" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="30" y="90" width="130" height="160" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <!-- Top accent - indigo -->
  <rect x="30" y="90" width="130" height="3" rx="2" fill="#818cf8"/>
  <!-- Stage number -->
  <text x="44" y="107" font-size="9" fill="#475569" font-weight="700">01</text>
  <!-- Icon area -->
  <text x="95" y="134" text-anchor="middle" font-size="26">📝</text>
  <!-- Stage name -->
  <text x="95" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Describe</text>
  <!-- Divider -->
  <line x1="46" y1="165" x2="144" y2="165" stroke="#1e293b" stroke-width="1"/>
  <!-- Description lines -->
  <text x="95" y="180" text-anchor="middle" font-size="8.5" fill="#94a3b8">Define modules,</text>
  <text x="95" y="193" text-anchor="middle" font-size="8.5" fill="#94a3b8">surfaces &amp; goals</text>
  <!-- Tag -->
  <rect x="54" y="228" width="82" height="14" rx="3" fill="rgba(129,140,248,0.12)" stroke="#818cf8" stroke-width="0.8"/>
  <text x="95" y="238.5" text-anchor="middle" font-size="7.5" fill="#818cf8" letter-spacing="0.3">mir.yaml · spec</text>

  <!-- Arrow 1→2 -->
  <line x1="162" y1="172" x2="179" y2="172" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── STAGE 2: Blueprint ── -->
  <rect x="184" y="92" width="130" height="160" rx="6" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="182" y="90" width="130" height="160" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <rect x="182" y="90" width="130" height="3" rx="2" fill="#38bdf8"/>
  <text x="196" y="107" font-size="9" fill="#475569" font-weight="700">02</text>
  <text x="247" y="134" text-anchor="middle" font-size="26">🗺️</text>
  <text x="247" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Blueprint</text>
  <line x1="198" y1="165" x2="296" y2="165" stroke="#1e293b" stroke-width="1"/>
  <text x="247" y="180" text-anchor="middle" font-size="8.5" fill="#94a3b8">AI generates</text>
  <text x="247" y="193" text-anchor="middle" font-size="8.5" fill="#94a3b8">contracts &amp; plan</text>
  <rect x="206" y="228" width="82" height="14" rx="3" fill="rgba(56,189,248,0.12)" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="247" y="238.5" text-anchor="middle" font-size="7.5" fill="#38bdf8" letter-spacing="0.3">blueprint.md</text>

  <!-- Arrow 2→3 -->
  <line x1="314" y1="172" x2="331" y2="172" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── STAGE 3: Review ── -->
  <rect x="336" y="92" width="130" height="160" rx="6" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="334" y="90" width="130" height="160" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <rect x="334" y="90" width="130" height="3" rx="2" fill="#a78bfa"/>
  <text x="348" y="107" font-size="9" fill="#475569" font-weight="700">03</text>
  <text x="399" y="134" text-anchor="middle" font-size="26">🔍</text>
  <text x="399" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Review</text>
  <line x1="350" y1="165" x2="448" y2="165" stroke="#1e293b" stroke-width="1"/>
  <text x="399" y="180" text-anchor="middle" font-size="8.5" fill="#94a3b8">Human approves</text>
  <text x="399" y="193" text-anchor="middle" font-size="8.5" fill="#94a3b8">contract edges</text>
  <rect x="358" y="228" width="82" height="14" rx="3" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="0.8"/>
  <text x="399" y="238.5" text-anchor="middle" font-size="7.5" fill="#a78bfa" letter-spacing="0.3">human gate</text>

  <!-- ╔══ FREEZE MARKER between Review and Dispatch ══╗ -->
  <!-- Vertical freeze line -->
  <line x1="466" y1="78" x2="466" y2="262" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <!-- Freeze badge -->
  <rect x="449" y="250" width="36" height="18" rx="9" fill="#0f172a" stroke="#f59e0b" stroke-width="1.2" filter="url(#glow-amber)"/>
  <text x="467" y="262" text-anchor="middle" font-size="7.5" fill="#f59e0b" font-weight="700">🔒</text>
  <!-- Freeze label above -->
  <rect x="415" y="68" width="104" height="14" rx="3" fill="#0f172a" opacity="0.9"/>
  <text x="467" y="78.5" text-anchor="middle" font-size="8" fill="#f59e0b" font-weight="700" letter-spacing="0.5">CONTRACT FROZEN</text>

  <!-- Arrow 3→4 (freeze arrow) -->
  <line x1="466" y1="172" x2="483" y2="172" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="none" marker-end="url(#arrow-freeze)" opacity="0.8"/>

  <!-- ── STAGE 4: Dispatch ── -->
  <rect x="488" y="92" width="130" height="160" rx="6" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="486" y="90" width="130" height="160" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <rect x="486" y="90" width="130" height="3" rx="2" fill="#f59e0b"/>
  <text x="500" y="107" font-size="9" fill="#475569" font-weight="700">04</text>
  <text x="551" y="134" text-anchor="middle" font-size="26">⚡</text>
  <text x="551" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Dispatch</text>
  <line x1="502" y1="165" x2="600" y2="165" stroke="#1e293b" stroke-width="1"/>
  <text x="551" y="180" text-anchor="middle" font-size="8.5" fill="#94a3b8">Spawn parallel</text>
  <text x="551" y="193" text-anchor="middle" font-size="8.5" fill="#94a3b8">build agents</text>
  <rect x="510" y="228" width="82" height="14" rx="3" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="551" y="238.5" text-anchor="middle" font-size="7.5" fill="#f59e0b" letter-spacing="0.3">n agents · parallel</text>

  <!-- Arrow 4→5 -->
  <line x1="618" y1="172" x2="635" y2="172" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── STAGE 5: Build ── -->
  <rect x="640" y="92" width="130" height="160" rx="6" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="638" y="90" width="130" height="160" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5" opacity="0.8"/>
  <rect x="638" y="90" width="130" height="3" rx="2" fill="#34d399"/>
  <text x="652" y="107" font-size="9" fill="#475569" font-weight="700">05</text>
  <text x="703" y="134" text-anchor="middle" font-size="26">🏗️</text>
  <text x="703" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Build</text>
  <line x1="654" y1="165" x2="752" y2="165" stroke="#1e293b" stroke-width="1"/>
  <text x="703" y="180" text-anchor="middle" font-size="8.5" fill="#94a3b8">Claude codes each</text>
  <text x="703" y="193" text-anchor="middle" font-size="8.5" fill="#94a3b8">module in isolation</text>
  <rect x="662" y="228" width="82" height="14" rx="3" fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="0.8"/>
  <text x="703" y="238.5" text-anchor="middle" font-size="7.5" fill="#34d399" letter-spacing="0.3">contract-bound</text>

  <!-- Arrow 5→6 -->
  <line x1="770" y1="172" x2="787" y2="172" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── STAGE 6: Verify ── -->
  <rect x="792" y="92" width="130" height="160" rx="6" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="790" y="90" width="130" height="160" rx="6" fill="#0f172a" stroke="#fb7185" stroke-width="1.5" opacity="0.8"/>
  <rect x="790" y="90" width="130" height="3" rx="2" fill="#fb7185"/>
  <text x="804" y="107" font-size="9" fill="#475569" font-weight="700">06</text>
  <text x="855" y="134" text-anchor="middle" font-size="26">✅</text>
  <text x="855" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Verify</text>
  <line x1="806" y1="165" x2="904" y2="165" stroke="#1e293b" stroke-width="1"/>
  <text x="855" y="180" text-anchor="middle" font-size="8.5" fill="#94a3b8">Tests, lint &amp;</text>
  <text x="855" y="193" text-anchor="middle" font-size="8.5" fill="#94a3b8">integration check</text>
  <rect x="814" y="228" width="82" height="14" rx="3" fill="rgba(251,113,133,0.12)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="855" y="238.5" text-anchor="middle" font-size="7.5" fill="#fb7185" letter-spacing="0.3">pass / retry</text>

  <!-- ============================================================ -->
  <!-- BOTTOM FLOW RIBBON (shows parallel build span)             -->
  <!-- ============================================================ -->
  <!-- Parallel span indicator below stages 4-5 -->
  <rect x="486" y="272" width="284" height="22" rx="4" fill="rgba(245,158,11,0.06)" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="4,2" opacity="0.7"/>
  <text x="628" y="286" text-anchor="middle" font-size="8" fill="#f59e0b" letter-spacing="0.5">parallel execution zone · agents run simultaneously</text>

  <!-- Bottom caption -->
  <text x="520" y="322" text-anchor="middle" font-size="8.5" fill="#334155" letter-spacing="0.5">contracts define boundaries · agents never cross module lines · human controls the gate</text>
</svg>
